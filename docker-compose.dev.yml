# Development overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Overrides the production `web` service with a dev image that:
#   • bind-mounts the repo root (live code reload without image rebuilds)
#   • uses Dockerfile.dev (all gems, no asset precompile)
#   • runs bin/dev instead of Thruster
#   • exposes port 3027 directly (no Thruster TLS proxy)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: pito:dev
    ports:
      - "127.0.0.1:${WEB_PORT:-3027}:3027"
    volumes:
      - .:/rails
      - rails_storage:/var/lib/pito-assets
      # Keep bundled gems from the image so host doesn't need Ruby
      - /usr/local/bundle
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PITO_ASSETS_PATH: /var/lib/pito-assets
    depends_on:
      postgres:
        condition: service_healthy
