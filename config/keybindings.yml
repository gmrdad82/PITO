# Unified keybindings schema — single source of truth for the Rails
# web app's leader-menu popup AND the Rust `pito` CLI's Ratatui leader
# overlay. Both surfaces parse this file at load time; edit it once,
# both stacks pick up the change.
#
# Source-of-truth docs:
#   docs/notes/2026-05-10-23-30-00-keybindings-unified-schema-proposal.md
#   (with the locked-decision block dated 2026-05-11 at the bottom).
#
# Conventions baked in:
#   l   = list (navigate to /<resource>)
#   +   = new / add
#   -   = bulk delete
#   r   = bulk resync
#   y   = bulk sync (capital-letter contexts only)
#   Esc = cancel / close popup
#   Backspace = up one level
#
# Capital letters at the root level point to global resource pages
# (channels, videos, projects, games, notifications). Lowercase
# letters are qualifiers / direct actions.
#
# Optional `surfaces:` key restricts an item to one surface; default
# is "both". TUI-only items (e.g. `q` quit) are filtered out of the
# web schema at render time and vice-versa.

leader:
  key: " "
  display: "_"

# Per-modal action keys — rendered in the leader popup INSTEAD of the
# page actions + nav + logout whenever a `<dialog open>` is on the
# page carrying `data-modal-actions-key="<key>"`. When a keyed modal
# is open the leader popup becomes modal-scoped: only this list
# renders, no navigation, no logout. When no keyed modal is open the
# leader popup falls back to the page-actions resolver (default
# behavior — see `page_actions:` below).
#
# Keyed by a modal identifier string. Phase B (still to come) wires
# the `data-modal-actions-key` attributes onto each modal `<dialog>`
# and fills in the items list per modal. Until then this block is an
# empty stub — `leader_menu_controller.js` tolerates a missing or
# empty `modal_actions` map.
#
# Item shape mirrors `page_actions` rows:
#   { key: <string>, label: <string>, action: { type: ..., ... } }
#
# Phase B (2026-05-17) — populated.
#
# Modal contexts registered below:
#   bundle          — /games bundles modal (display + inline-edit
#                     title). Action keys: `l` dark mode, `c` rename.
#   webhook_help    — Discord + Slack help modals (one shared component,
#                     two invocations — adding the attribute on the
#                     shared component scopes it to both). Informational,
#                     so only `l` dark mode is exposed.
#   revoke_confirm  — /settings/security session-revoke confirm modal.
#                     Action keys: `l` dark mode, `r` revoke.
#   reindex_confirm — /settings/stack Meilisearch reindex confirm modal.
#                     Action keys: `l` dark mode, `r` reindex.
#   sync_confirm    — /games/:id breadcrumb [sync] confirm modal (dangerous
#                     action — consumes from the IGDB request quota).
#                     Action keys: `l` dark mode, `s` confirm sync.
#
# Two new action types are introduced in lockstep with this block:
#
#   trigger_inline_edit { target: <hook> }
#     Programmatically activates the inline-edit Stimulus controller
#     attached to the element carrying
#     `[data-modal-action-target="<hook>"]` inside the currently open
#     `<dialog>`. The web side resolves the `inline-title-edit`
#     controller via `application.getControllerForElementAndIdentifier`
#     and calls `.edit()` on it (same flow the `[change]` link triggers
#     today).
#
#   submit_confirm_modal
#     Submits the form inside the currently open `<dialog>` via
#     `form.requestSubmit()`. No `target:` needed — the resolver finds
#     the open dialog and the form inside it.
modal_actions:
  bundle:
    items:
      - key: l
        label: dark mode
        action:
          type: theme_toggle
      - key: c
        label: rename bundle
        action:
          type: trigger_inline_edit
          target: bundle-modal-title-edit
  # 2026-05-18 — Per-bundle `[-]` confirm-delete dialog (rendered as a
  # sibling of each bundle tile in `_bundles_for_shelf`). The dialog
  # carries a submit form; `submit_confirm_modal` finds the open
  # dialog and `requestSubmit()`s its form so `d` confirms the delete
  # the same way `[delete]` does.
  bundle_delete_confirm:
    items:
      - key: l
        label: dark mode
        action:
          type: theme_toggle
      - key: d
        label: delete
        action:
          type: submit_confirm_modal
  webhook_help:
    items:
      - key: l
        label: dark mode
        action:
          type: theme_toggle
  revoke_confirm:
    items:
      - key: l
        label: dark mode
        action:
          type: theme_toggle
      - key: r
        label: revoke session(s)
        action:
          type: submit_confirm_modal
  reindex_confirm:
    items:
      - key: l
        label: dark mode
        action:
          type: theme_toggle
      - key: r
        label: reindex
        action:
          type: submit_confirm_modal
  sync_confirm:
    items:
      - key: l
        label: dark mode
        action:
          type: theme_toggle
      - key: s
        label: sync
        action:
          type: submit_confirm_modal

# Per-page action keys — rendered in the page-actions section of the
# keybindings popup (shown FIRST, above the nav menus). Each page
# resolves to a list of { key, label, action } rows for actions that
# apply to the current page (search, sync, delete, etc.). Pages not
# listed here fall back to `default:`. The renderer hides the
# page-actions section entirely when a page resolves to an empty list
# (e.g. /settings). Per spec 09 in
# docs/plans/beta/27-games-listing-shelves-filters-display-modes/specs-v2/.
page_actions:
  games_index:
    - key: l
      label: dark mode
      action:
        type: theme_toggle
    # 2026-05-18 — `/` opens the page-scoped omnisearch modal
    # (`:games_search` mode). Local games + bundles + IGDB. The dialog
    # is mounted at the bottom of `app/views/games/index.html.erb` with
    # id `omnisearch-modal-games-search`; the leader-menu's
    # `open_modal_by_id` resolver wakes it up.
    - key: "/"
      label: search
      action:
        type: open_modal_by_id
        target: omnisearch-modal-games-search
    # Filter-chip toggles, flat 2-key bindings (2026-05-18 — the
    # earlier `f filter` nested submenu was dropped now that the prefix
    # accumulator supports multi-char page_actions keys, same mechanic
    # the /settings `sr`/`da`/`dd`/`sa`/`sd`/`vr` bindings use). `f` is
    # a prefix-only key; pressing `f` alone arms the accumulator and
    # waits for the second key. Each binding dispatches
    # `toggle_filter_chip` with the matching `data-filter-token` on the
    # /games filter row (single source of truth — the leader menu
    # delegates to the existing chip click handler via `chip.click()`,
    # no logic duplication). Only attached to `games_index` because
    # filter chips only exist on /games — adding the bindings to
    # games_show / bundles_show / settings would be a no-op. User-
    # locked 2026-05-18.
    - key: fr
      label: released
      action: { type: toggle_filter_chip, token: released }
    - key: fs
      label: scheduled
      action: { type: toggle_filter_chip, token: scheduled }
    - key: fo
      label: owned
      action: { type: toggle_filter_chip, token: owned }
    - key: fw
      label: wishlist
      action: { type: toggle_filter_chip, token: wishlist }
    - key: fp
      label: played
      action: { type: toggle_filter_chip, token: played }
    # Hairline separator between lifecycle/ownership/engagement state
    # chips (top group: released/scheduled/owned/wishlist/played) and
    # platform chips (bottom group: PS/Switch/Steam). Renderers
    # (`leader_menu_controller.js` web, the TUI equivalent in
    # `extras/cli/`) skip divider entries during key dispatch and
    # paint them as visual separators only. Divider rendering goes
    # through the shared `buildItemRow` path so dividers in
    # `page_actions` paint identically to dividers in `menus.root`.
    - divider: true
    - key: fP
      label: PS
      action: { type: toggle_filter_chip, token: ps }
    - key: fN
      label: Switch
      action: { type: toggle_filter_chip, token: switch }
    - key: fS
      label: Steam
      action: { type: toggle_filter_chip, token: steam }
  games_show:
    - key: l
      label: dark mode
      action:
        type: theme_toggle
    - key: "/"
      label: search
      action:
        type: open_modal
        modal_id: search_placeholder
    - key: s
      label: sync
      action:
        type: page_sync
    - key: "-"
      label: delete
      action:
        type: page_delete
  bundles_show:
    - key: l
      label: dark mode
      action:
        type: theme_toggle
    - key: "/"
      label: search
      action:
        type: open_modal
        modal_id: search_placeholder
    - key: s
      label: sync
      action:
        type: page_sync
    - key: "-"
      label: delete
      action:
        type: page_delete
  # /settings ships dark-mode plus a set of 2-key flat bindings for
  # the page's primary actions (Phase C, 2026-05-17). No `/ search`
  # — /settings is a utility surface; search isn't useful here.
  #
  # 2-key bindings (parsed by the prefix accumulator in
  # `leader_menu_controller.js#handlePrefixKey` — multi-char keys
  # work because the accumulator collects characters until either an
  # exact match has no longer prefix candidate OR the 1500 ms
  # inactivity timer fires the recorded exact match):
  #
  #   sr — pre-check every session checkbox EXCEPT the current
  #        (`[this]`) row, then open the revoke-sessions confirm
  #        modal (mounted by `_security_pane.html.erb` as
  #        `<dialog id="revoke_sessions_modal">`). The auto-check
  #        encodes the action label "revoke unused sessions": every
  #        session other than this one IS the unused set. The
  #        `open_revoke_unused_modal` action type ticks the checkboxes
  #        and then delegates to the `sessions-bulk-revoke` controller's
  #        `open()` so the modal title, conditional warning, and form
  #        action populate the same way they do on a manual click of
  #        `[revoke N]`. Once the modal is open, the `revoke_confirm`
  #        modal_actions take over (`l` dark mode + `r` revoke
  #        session(s) + Esc close).
  #   vr — open the reindex Meilisearch confirm modal (mounted by
  #        `_stack_pane.html.erb` via `ConfirmModalComponent` as
  #        `<dialog id="reindex_meilisearch_modal">`). Once open,
  #        the `reindex_confirm` modal_actions take over.
  #   da / dd — Discord every notification / daily digest toggles.
  #   sa / sd — Slack every notification / daily digest toggles.
  #
  # Discord + Slack toggles target `[data-leader-toggle="<target>"]`
  # hooks that Phase D will attach to the actual auto-save checkboxes
  # once the Discord/Slack pane form restructure ships. Until Phase D
  # the action silently no-ops when the hook is missing — no thrown
  # errors, just nothing happens. Phase C ships the keybinding
  # mechanic; Phase D wires the targets.
  #
  # Prefix-conflict note: `d` is no longer an exact binding (theme
  # toggle moved to `l` on 2026-05-17). `d` is still a prefix for
  # `da` and `dd`, but pressing `d` alone now fires nothing — the
  # prefix accumulator waits for the second key (a/d) or the 1500 ms
  # timeout (which expires with no recorded exact match → no-op).
  # `s` is a prefix-only key for `sr` + `sa` + `sd` (no exact `s`
  # binding); pressing `s` then `r`/`a`/`d` fires the matching
  # 2-key binding. `l` (dark mode) has no longer-prefix neighbors
  # so it fires immediately on press.
  settings:
    - key: l
      label: dark mode
      action:
        type: theme_toggle
    - key: sr
      label: revoke unused sessions
      action:
        type: open_revoke_unused_modal
        target: revoke_sessions_modal
    - key: da
      label: Discord every notification
      action:
        type: toggle_setting
        target: discord_every_notification
    - key: dd
      label: Discord daily digest
      action:
        type: toggle_setting
        target: discord_daily_digest
    - key: sa
      label: Slack every notification
      action:
        type: toggle_setting
        target: slack_every_notification
    - key: sd
      label: Slack daily digest
      action:
        type: toggle_setting
        target: slack_daily_digest
    - key: vr
      label: Voyage reindex
      action:
        type: open_modal_by_id
        target: reindex_meilisearch_modal
  default:
    - key: l
      label: dark mode
      action:
        type: theme_toggle
    - key: "/"
      label: search
      action:
        type: open_modal
        modal_id: search_placeholder

menus:
  # 2026-05-18 — flat 2-key dispatch. The earlier nested-submenu
  # architecture (Space → `g` opens the games submenu → user presses
  # `l` to navigate) was dropped in favour of direct 2-key resolution
  # (Space → `G` → `l` resolves `Gl games list` via the existing
  # prefix accumulator). This makes the leader-menu protocol uniform
  # with the existing `page_actions` 2-key dispatch (filter chips on
  # /games: `fr`/`fs`/`fo`/`fw`/`fp`/`fP`/`fN`/`fS`, /settings:
  # `sr`/`vr`/`da`/`dd`/`sa`/`sd`). The intermediate submenu UX is
  # gone schema-wide.
  #
  # Prefix-letter assignments (case-sensitive):
  #   c → calendar         C → channels       V → videos
  #   P → projects         G → games          N → notifications
  # Direct-key entries (no prefix continuation):
  #   h → home             S → settings       Q → logout
  #   q → quit (TUI-only)
  #
  # No collisions across the flattened bindings — each prefix letter
  # is unique per case, and the second char namespaces under it.
  # `c` (calendar prefix) does not conflict with `C` (channels prefix)
  # because key matching is case-sensitive in
  # `leader_menu_controller.js#candidatesForPrefix`.
  #
  # The prefix accumulator handles multi-char keys natively (see
  # `handlePrefixKey` + `armPrefixTimer`): pressing the first char
  # arms the timer; the second char resolves the exact match;
  # 1500 ms inactivity OR a no-match second char resets the prefix.
  # Direct single-char entries (h/S/Q/q) fire immediately on press
  # because they have no longer-prefix candidates.
  #
  # Divider entries split the visual list into logical groups (home,
  # navigation prefixes, settings, logout). Renderers skip dividers
  # during key dispatch — they are visual hairlines only. The same
  # divider mechanic is used by /games `f*` filter chips today.
  root:
    items:
      - { key: h, label: home, action: { type: navigate, path: "/" } }
      - divider: true
      - { key: cs, label: "calendar schedule",   action: { type: navigate, path: "/calendar/schedule" } }
      - { key: cm, label: "calendar month",      action: { type: navigate, path: "/calendar/month" } }
      - { key: ct, label: "calendar today",      action: { type: today } }
      - { key: "c+", label: "calendar new",      action: { type: open, target: new_calendar_entry } }
      - divider: true
      - { key: Cl, label: "channels list",       action: { type: navigate, path: "/channels" } }
      - { key: "C+", label: "channels add",      action: { type: navigate, path: "/channels" } }
      - { key: "C-", label: "channels delete",   action: { type: bulk_delete } }
      - { key: Cy, label: "channels sync",       action: { type: bulk_sync } }
      - divider: true
      - { key: Vl, label: "videos list",         action: { type: navigate, path: "/videos" } }
      - { key: "V+", label: "videos upload",     action: { type: open, target: video_upload } }
      - { key: "V-", label: "videos delete",     action: { type: bulk_delete } }
      - divider: true
      - { key: Pl, label: "projects list",       action: { type: navigate, path: "/projects" } }
      - { key: "P+", label: "projects new",      action: { type: open, target: new_project } }
      - { key: "P-", label: "projects delete",   action: { type: bulk_delete } }
      - divider: true
      - { key: Gl, label: "games list",          action: { type: navigate, path: "/games" } }
      - { key: "G+", label: "games new",         action: { type: open, target: igdb_search } }
      - divider: true
      - { key: Nl, label: "notifications list",          action: { type: open, target: notifications_modal } }
      - { key: Nu, label: "notifications filter unread", action: { type: filter_unread } }
      - { key: Nm, label: "notifications mark all read", action: { type: mark_all_read } }
      - divider: true
      - { key: S, label: settings, action: { type: navigate, path: "/settings" } }
      - { key: q, label: quit,     action: { type: quit }, surfaces: [tui] }
      - divider: true
      - { key: Q, label: logout,   action: { type: logout } }

