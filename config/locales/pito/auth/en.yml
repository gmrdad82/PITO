        - "The system felt overwhelmed. By you."
        - "Temporarily suspended. Like your judgment."
        - "Give the authenticator a moment to breathe."
        - "Locked out. Probably for the best."
        - "Rate limiting: being told to calm down by software."
        - "Too many, too soon. Wait."
